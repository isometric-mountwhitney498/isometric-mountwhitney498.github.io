<style>
  :root {
    --green: #2ecc71; --green-dark: #27ae60; --green-deep: #16a35a;
    --green-soft: #e8f8ef; --green-tint: #c6f0d8;
    --mint: #f0fdf4; --text: #1a2e1f; --text-mute: #5a7a62;
    --bg: #fafffe; --white: #ffffff;
    --shadow: 0 4px 20px rgba(26,163,90,0.08);
    --shadow-hover: 0 12px 40px rgba(26,163,90,0.15);
    --radius: 16px; --radius-lg: 24px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
  a { color: var(--green-deep); text-decoration: none; }

  /* WhatsApp Float */
  .wa-float { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: #25d366; box-shadow: 0 8px 32px rgba(37,211,102,0.35); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: all 0.35s; }
  .wa-float:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 16px 48px rgba(37,211,102,0.5); }
  .wa-icon { width: 30px; height: 30px; fill: #fff; }

  /* Nav */
  .nav { background: rgba(250,255,254,0.96); backdrop-filter: blur(20px); box-shadow: 0 4px 24px rgba(26,163,90,0.08); border-bottom: 1px solid rgba(26,163,90,0.06); padding: 0 48px; height: 72px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-logo-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 14px; }
  .nav-logo-name { color: var(--green-deep); font-weight: 700; font-size: 14px; }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a { color: var(--text); font-weight: 500; font-size: 13px; text-decoration: none; }
  .nav-links a:hover { color: var(--green-deep); }
  .nav-wa { background: #25d366; color: #fff !important; padding: 8px 20px; border-radius: 100px; font-weight: 600; }
  .nav-wa:hover { background: #1da851; color: #fff !important; }

  /* Hero */
  .form-hero { padding: 120px 48px 60px; text-align: center; background: var(--mint); }
  .form-hero h1 { font-family: 'Nunito','Inter',sans-serif; font-size: 36px; font-weight: 800; color: var(--text); margin-bottom: 12px; }
  .form-hero p { font-size: 16px; color: var(--text-mute); max-width: 500px; margin: 0 auto; }

  /* Form */
  .form-section { max-width: 680px; margin: 0 auto; padding: 0 48px 100px; }
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .form-hint { font-size: 12px; color: var(--text-mute); margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 12px 16px; border: 1px solid var(--green-tint); border-radius: var(--radius); font-size: 14px; font-family: 'Inter', sans-serif; transition: all 0.3s; background: var(--white); }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
  .form-textarea { min-height: 120px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .form-btn { display: flex; align-items: center; gap: 8px; padding: 14px 36px; background: var(--green); color: #fff; border: none; border-radius: 100px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 24px rgba(46,204,113,0.3); }
  .form-btn:hover { background: var(--green-dark); transform: translateY(-2px); }
  .form-submit { display: flex; justify-content: center; margin-top: 32px; }

  .form-note { text-align: center; font-size: 12px; color: var(--text-mute); margin-top: 16px; }
  .form-note a { color: var(--green-deep); }
  .form-thanks { display: none; padding: 60px 40px; text-align: center; }
  .form-thanks h3 { font-size: 24px; color: var(--green-deep); margin-bottom: 12px; }

  /* Footer */
  .footer { padding: 40px 20px; text-align: center; background: var(--white); border-top: 1px solid rgba(46,204,113,0.08); font-size: 12px; color: var(--text-mute); }

  @media(max-width:860px){
    .form-row { grid-template-columns: 1fr; }
    .nav-links { display: none; }
  }
</style>
</head>
